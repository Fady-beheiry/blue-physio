kind = "web"
previewPath = "/"
title = "Blue Physio Clinic"
version = "1.0.0"
id = "artifacts/blue-physio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22990

[services.development]
run = "pnpm --filter @workspace/blue-physio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blue-physio", "run", "build" ]
publicDir = "artifacts/blue-physio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22990"
BASE_PATH = "/"
